name: Publish website to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy using Custom FTP Action
        uses: ./.github/actions/ftp-deploy
        with:
          server: ${{ secrets.DAI_FTP_SERVER }}
          username: ${{ secrets.DAI_FTP_USERNAME }}
          password: ${{ secrets.DAI_FTP_PASSWORD }}
